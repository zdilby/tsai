<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>TSAI 管理后台</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/images/favicon.png">
    <link rel="stylesheet" href="/static/materialize/css/materialize.min.css">
    <link rel="stylesheet" href="/static/css/admin.css">
    <style>
        .board-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 24px;
        }
        .board-card {
            background: #fff;
            border-radius: 8px;
            padding: 32px 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
            transition: transform 0.15s, box-shadow 0.15s;
            cursor: pointer;
            text-decoration: none;
            color: #333;
            display: block;
        }
        .board-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            color: #1976d2;
        }
        .board-card h5 { margin: 12px 0 8px; font-weight: 500; }
        .board-card .desc { color: #757575; font-size: 14px; }
        .board-card .icon { font-size: 48px; color: #1976d2; }
    </style>
</head>
<body>
<nav class="admin-nav">
    <div class="nav-wrapper">
        <span class="brand-text">TSAI 管理后台</span>
        <span class="admin-badge">{{ admin.username }}</span>
    </div>
</nav>
<div class="admin-container">
    <h5 class="section-title">选择管理板块</h5>
    <div class="board-grid">
        <a class="board-card" href="/admin/users">
            <div class="icon">👥</div>
            <h5>用户管理</h5>
            <div class="desc">查看用户、配额、Session、邀请码</div>
        </a>
        <a class="board-card" href="/admin/perf">
            <div class="icon">⚙️</div>
            <h5>性能调优</h5>
            <div class="desc">机器人 Query 监控、Trace 分析、Prompt 版本管理</div>
        </a>
    </div>
</div>
<script src="/static/materialize/js/materialize.min.js"></script>
</body>
</html>
