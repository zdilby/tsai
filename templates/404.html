<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>页面不存在 · TSAI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/images/favicon.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .code {
            font-size: 6rem;
            font-weight: 700;
            color: #26a69a;
            line-height: 1;
        }
        .title {
            font-size: 1.5rem;
            margin: 1rem 0 0.5rem;
        }
        .desc {
            color: #757575;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            padding: 0.6rem 1.6rem;
            background: #26a69a;
            color: #fff;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.95rem;
            transition: background 0.2s;
        }
        .btn:hover { background: #00897b; }
    </style>
</head>
<body>
<div class="container">
    <div class="code">404</div>
    <div class="title">页面不存在</div>
    <p class="desc">你访问的地址不存在，可能已被移除或输入有误。</p>
    <a href="/" class="btn">返回首页</a>
</div>
</body>
</html>
